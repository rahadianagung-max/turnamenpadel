<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — TurnamenPadel</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:ital,wght@0,700;0,800;0,900;1,800;1,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="/theme-dark.css"/>
<style>
.wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.wrap::before{content:"";position:absolute;inset:0;background:radial-gradient(620px 320px at 50% -10%,rgba(255,106,0,.16),transparent 60%);pointer-events:none}
.card{position:relative;width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:34px 30px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.brandbig{font-family:var(--display);font-style:italic;font-weight:900;font-size:26px;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;text-align:center;display:block}
.eyebrow{text-align:center;margin-top:14px}
.title{font-family:var(--display);font-weight:900;text-transform:uppercase;font-size:30px;letter-spacing:-.02em;text-align:center;margin:6px 0 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle);margin-bottom:7px}
.field input{width:100%;background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--orange)}
.submit{width:100%;justify-content:center;margin-top:6px}
.msg{min-height:18px;font-size:12.5px;margin-top:12px;text-align:center}
.msg.err{color:#FF8A85}
.msg.ok{color:var(--green)}
.back{display:block;text-align:center;margin-top:18px;font-size:12px;color:var(--muted)}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <a href="/" class="brandbig">TurnamenPadel</a>
    <div class="eyebrow">Tournament Engine</div>
    <h1 class="title" id="loginTitle">Admin Login</h1>
    <p class="lead" id="loginLead" style="text-align:center;font-size:12.5px;color:var(--muted);margin:-14px 0 20px;">Setiap turnamen dicatat atas nama admin yang login.</p>
    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="u">Username</label>
        <input id="u" name="username" type="text" autocomplete="username" required/>
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required/>
      </div>
      <div class="field" id="venueField" style="display:none;">
        <label for="v">Venue (opsional)</label>
        <input id="v" name="venue" type="text" autocomplete="off"/>
      </div>
      <button class="btn btn--primary submit" id="submitBtn" type="submit"><i class="ti ti-login-2" aria-hidden="true"></i> <span id="submitLabel">Sign In</span></button>
      <div class="msg" id="msg" aria-live="polite"></div>
    </form>
    <a href="/" class="back">← Back to home</a>
  </div>
</div>
<script>
(function(){
  // Real multi-admin login: authenticates against the Admins sheet via the API.
  // Each admin gets their own login; tournaments they create are recorded under
  // their username. Superadmins can add more admins from inside the engine.
  var BASE = location.protocol.startsWith('http') ? '/api' : 'https://www.turnamenpadel.com/api';
  var ENGINE = '/engine'; // where a signed-in admin lands
  var form=document.getElementById('loginForm'),
      msg=document.getElementById('msg'),
      btn=document.getElementById('submitBtn'),
      setupMode=false;

  async function api(path, opts){
    opts=opts||{};
    var res=await fetch(BASE+'/'+path, {
      method: opts.method||'GET',
      headers: {'Content-Type':'application/json'},
      body: opts.body?JSON.stringify(opts.body):undefined,
    });
    var data={}; try{ data=await res.json(); }catch(e){}
    if(!res.ok){ var err=new Error(data.error||('HTTP '+res.status)); err.status=res.status; throw err; }
    return data;
  }
  function saveSession(s){
    try{
      sessionStorage.setItem('tp_auth','1');
      sessionStorage.setItem('tp_session', JSON.stringify(s));
      localStorage.setItem('tp_session', JSON.stringify(s));
    }catch(e){}
  }
  function enterSetup(){
    setupMode=true;
    document.getElementById('loginTitle').textContent='Buat Superadmin';
    document.getElementById('loginLead').textContent='Belum ada admin. Buat akun superadmin pertama — akun ini bisa menambah admin lain.';
    document.getElementById('venueField').style.display='';
    document.getElementById('submitLabel').textContent='Buat & Masuk';
  }

  // If already signed in, skip straight to the engine.
  try{
    var existing=JSON.parse(sessionStorage.getItem('tp_session')||localStorage.getItem('tp_session')||'null');
    if(existing && existing.username){ location.replace(ENGINE); }
  }catch(e){}

  // Detect first-run (no admins yet) to offer superadmin setup.
  api('admins').then(function(d){
    if(!d.admins || d.admins.length===0) enterSetup();
  }).catch(function(){});

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var username=document.getElementById('u').value.trim();
    var password=document.getElementById('p').value;
    var venue=document.getElementById('v').value.trim();
    if(!username || !password){ msg.className='msg err'; msg.textContent='Isi username dan password.'; return; }
    btn.disabled=true; msg.className='msg'; msg.textContent='…';
    try{
      if(setupMode){
        await api('admins', { method:'POST', body:{ username:username, password:password, role:'superadmin', venue:venue } });
      }
      var s=await api('auth/login', { method:'POST', body:{ username:username, password:password } });
      saveSession(s);
      msg.className='msg ok'; msg.textContent='Selamat datang, '+s.username+'. Memuat engine…';
      location.href=ENGINE;
    }catch(err){
      btn.disabled=false;
      msg.className='msg err';
      msg.textContent = err.status===401 ? 'Username atau password salah.' : (err.message||'Gagal masuk.');
    }
  });
})();
</script>
</body>
</html>
